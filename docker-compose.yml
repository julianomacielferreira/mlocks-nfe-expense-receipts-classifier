version: '3.9'

services:
  api:
    build: ./api
    container_name: mlocks-nferc-api
    env_file:
      - .env
    ports:
      - "${API_PORT}:8000"
    restart: unless-stopped
    depends_on:
      database:
        condition: service_healthy
      ollama:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mlocks-nferc-network

  database:
    image: postgres:15-alpine
    container_name: mlocks-nferc-db
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d mlocks_nferc_db" ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - mlocks-nferc-network

  ollama:
    image: ollama/ollama:latest
    container_name: mlocks-nferc-ollama
    env_file:
      - .env
    ports:
      - "${OLLAMA_PORT}:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "ollama", "list" ]
      interval: 20s
      retries: 10
      timeout: 10s
    # Descomente para usar GPU NVIDIA
    # deploy:
    # resources:
    # reservations:
    # devices:
    # - driver: nvidia
    # count: 1
    # capabilities: [gpu]
    networks:
      - mlocks-nferc-network

  qdrant:
    image: qdrant/qdrant:latest
    container_name: mlocks-nferc-qdrant
    ports:
      - "6333:6333" # REST API
      - "6334:6334" # gRPC API
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped
    networks:
      - mlocks-nferc-network

  frontend:
    image: nginx:alpine
    container_name: mlocks-nferc-frontend
    env_file:
      - .env
    ports:
      - "${FRONTEND_PORT}:80"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - mlocks-nferc-network

volumes:
  pgdata:
    driver: local
  ollama_data:
    driver: local
  qdrant_data:
    driver: local

networks:
  mlocks-nferc-network:
    driver: bridge
